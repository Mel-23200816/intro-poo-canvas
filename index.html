<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intro Canvas 2D</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon" />
    
    <link rel="stylesheet" href="./assets/CSS/styles.css">
</head>

<body>

    <nav class="navbar navbar-expand-lg custom-navbar py-3 border-bottom">
        <div class="container">
            <a class="navbar-brand" href="#">
                <span class="text-accent">Canvas</span>Lab
            </a>
        </div>
    </nav>

    <main class="container my-5">
        
        <div class="row mb-5 text-center">
            <div class="col-12">
                <h1 class="mb-2 fw-bold text-dark">Objetos 2D mediante OOP</h1>
                <p class="text-muted">Exploración visual utilizando la API de Canvas en HTML5.</p>
            </div>
        </div>

        <div class="row g-4 text-center justify-content-center">
            
            <div class="col-12 col-md-6 col-lg-4">
                <div class="canvas-wrapper">
                    <div class="canvas-header">
                        <h2 class="canvas-title">Objeto 2D Estático</h2>
                    </div>
                    <div class="canvas-body">
                        <canvas id="canvasOOP" class="custom-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="canvas-wrapper">
                    <div class="canvas-header">
                        <h2 class="canvas-title">Objeto con Random</h2>
                    </div>
                    <div class="canvas-body">
                        <canvas id="canvasRandom" class="custom-canvas"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-6 col-lg-4">
                <div class="canvas-wrapper">
                    <div class="canvas-header">
                        <h2 class="canvas-title">Múltiples Objetos</h2>
                    </div>
                    <div class="canvas-body">
                        <canvas id="canvasMultiple" class="custom-canvas"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="custom-footer mt-auto py-5">
        <div class="container text-center">
            <h5 class="text-accent mb-2">Miguel Angel Cano Alejandro</h5>
            <p class="mb-1 text-light">Estudiante de 6to Semestre | Instituto Tecnológico de Pachuca</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM"
        crossorigin="anonymous"></script>
        
    <script src="./assets/js/main.js"></script>
</body>

</html>
